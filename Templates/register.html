<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GradeVault — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logo .logo-icon {
      font-size: 2.5rem;
      color: var(--accent);
      display: block;
      margin-bottom: 8px;
    }
    .auth-logo h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    .auth-logo p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 4px;
    }
    .auth-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 1.2rem;
    }
    .auth-group label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .auth-group input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font-display);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .auth-group input:focus { border-color: var(--accent); }
    .auth-btn {
      width: 100%;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .auth-btn:hover { background: #f5d454; }
    .auth-error {
      background: rgba(247,96,79,0.1);
      border: 1px solid rgba(247,96,79,0.3);
      color: var(--red);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      font-family: var(--font-mono);
      margin-bottom: 1rem;
      display: none;
    }
    .auth-error.show { display: block; }
    .auth-success {
      background: rgba(61,214,140,0.1);
      border: 1px solid rgba(61,214,140,0.3);
      color: var(--green);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      font-family: var(--font-mono);
      margin-bottom: 1rem;
      display: none;
    }
    .auth-success.show { display: block; }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover { text-decoration: underline; }
    /* Info box explaining who can register */
    .info-box {
      background: rgba(79,142,247,0.08);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.8rem;
      color: var(--muted);
      font-family: var(--font-mono);
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <span class="logo-icon">◈</span>
        <h1>GradeVault</h1>
        <p>Create your student account</p>
      </div>

      <!-- Info message -->
      <div class="info-box">
        👨‍🎓 This registration is for <strong>students only</strong>. Teachers are added by the admin.
      </div>

      <!-- Error and success messages -->
      <div class="auth-error" id="reg-error"></div>
      <div class="auth-success" id="reg-success"></div>

      <!-- Full name -->
      <div class="auth-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" placeholder="e.g. Jane Mwangi"/>
      </div>

      <!-- Username -->
      <div class="auth-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Choose a username"/>
      </div>

      <!-- Email -->
      <div class="auth-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="e.g. jane@school.ac.ke"/>
      </div>

      <!-- Password with eye toggle -->
      <div class="auth-group">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="Choose a password"/>
          <button type="button" class="eye-btn" onclick="togglePassword('password', this)" title="Show/hide password">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:18px;height:18px">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Confirm Password with eye toggle -->
      <div class="auth-group">
        <label for="confirm-password">Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="confirm-password" placeholder="Repeat your password"/>
          <button type="button" class="eye-btn" onclick="togglePassword('confirm-password', this)" title="Show/hide password">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:18px;height:18px">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Register button -->
      <button class="auth-btn" id="register-btn">Create Account</button>

      <!-- Link back to login -->
      <div class="auth-footer">
        Already have an account? <a href="/login">Sign in here</a>
      </div>

    </div>
  </div>

  <script>
    // ── Eye icon toggle ──
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const isHidden = input.type === "password";
      input.type = isHidden ? "text" : "password";
      btn.innerHTML = isHidden
        ? `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:18px;height:18px">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.956 9.956 0 012.223-3.592M6.53 6.533A9.956 9.956 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.978 9.978 0 01-4.072 5.293M15 12a3 3 0 11-4.243-4.243M3 3l18 18"/>
          </svg>`
        : `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:18px;height:18px">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>`;
    }

    document.getElementById("register-btn").addEventListener("click", register);

    async function register() {
      const fullname  = document.getElementById("fullname").value.trim();
      const username  = document.getElementById("username").value.trim();
      const email     = document.getElementById("email").value.trim();
      const password  = document.getElementById("password").value;
      const confirm   = document.getElementById("confirm-password").value;
      const errorBox  = document.getElementById("reg-error");
      const successBox = document.getElementById("reg-success");

      // Hide previous messages
      errorBox.classList.remove("show");
      successBox.classList.remove("show");

      // Validate all fields are filled
      if (!fullname || !username || !email || !password || !confirm) {
        errorBox.textContent = "Please fill in all fields.";
        errorBox.classList.add("show");
        return;
      }

      // Check passwords match
      if (password !== confirm) {
        errorBox.textContent = "Passwords do not match.";
        errorBox.classList.add("show");
        return;
      }

      // Check password is at least 6 characters
      if (password.length < 6) {
        errorBox.textContent = "Password must be at least 6 characters.";
        errorBox.classList.add("show");
        return;
      }

      // Send POST request to /api/register
      const res = await fetch("/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ fullname, username, email, password, role: "student" })
      });

      const data = await res.json();

      if (data.error) {
        errorBox.textContent = data.error;
        errorBox.classList.add("show");
      } else {
        // Show success and redirect to login after 2 seconds
        successBox.textContent = "Account created! Redirecting to login...";
        successBox.classList.add("show");
        setTimeout(() => { window.location.href = "/login"; }, 2000);
      }
    }
  </script>

</body>
</html>
